<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo HRV en Tiempo Real</title>
    <!-- Cargamos la librería oficial de Supabase para enviar datos fácilmente -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            font-size: 16px;
            border-radius: 25px;
            box-sizing: border-box;
            border: none;
        }
        input {
            background-color: #2b2b2b;
            color: white;
            text-align: center;
        }
        button {
            background-color: #00adb5;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled { background-color: #444444; cursor: not-allowed; }
        #progressContainer {
            margin-top: 20px;
            background-color: #333;
            border-radius: 10px;
            display: none;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 20px;
            background-color: #00adb5;
            transition: width 0.1s linear;
        }
        #status { margin-top: 15px; font-size: 14px; color: #aaaaaa; }
        #result {
            margin-top: 25px;
            padding: 15px;
            background: #252525;
            border-radius: 10px;
            display: none;
            border: 1px solid #333;
        }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Test de HRV Matutino</h2>
    <p style="font-size: 13px; color: #ccc;">Coloca tu dedo índice cubriendo firmemente la cámara trasera y el flash.</p>
    
    <!-- Entrada para identificar al alumno -->
    <input type="text" id="alumnoInput" placeholder="Escribe tu Nombre y Apellido" />
    
    <button id="startBtn">Iniciar Medición (60s)</button>
    
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
    
    <div id="status">Ingresa tu nombre para comenzar.</div>
    
    <div id="result">
        <h3>Resultado de hoy</h3>
        <p id="rmssdVal" style="font-size: 28px; font-weight: bold; color: #00adb5; margin: 10px 0;"></p>
        <p id="pulseVal" style="font-size: 15px; color: #eee;"></p>
        <p id="cloudStatus" style="font-size: 13px; color: #28a745; font-weight: bold; margin-top: 10px;"></p>
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="20" height="20"></canvas>

<script>
// CONFIGURACIÓN DE TU CONEXIÓN CON SUPABASE[cite: 1]
const SUPABASE_URL = "https://ahsqbiqbxyqmzejhjiwt.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoc3FiaXFieHlxbXplamhqaXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDc3MjcsImV4cCI6MjA5OTYyMzcyN30.UpGXmJK2N8SNVhKvh1xijpYfCC1KH_91nFdjA461g9M";
    
supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); //[cite: 1]

const startBtn = document.getElementById('startBtn'); //[cite: 1]
const alumnoInput = document.getElementById('alumnoInput'); //[cite: 1]
const progressContainer = document.getElementById('progressContainer'); //[cite: 1]
const progressBar = document.getElementById('progressBar'); //[cite: 1]
const statusDiv = document.getElementById('status'); //[cite: 1]
const resultDiv = document.getElementById('result'); //[cite: 1]
const rmssdVal = document.getElementById('rmssdVal'); //[cite: 1]
const pulseVal = document.getElementById('pulseVal'); //[cite: 1]
const cloudStatus = document.getElementById('cloudStatus'); //[cite: 1]
const video = document.getElementById('video'); //[cite: 1]
const canvas = document.getElementById('canvas'); //[cite: 1]
const ctx = canvas.getContext('2d', { willReadFrequently: true }); //[cite: 1]

let streamRef = null; //[cite: 1]
let animationFrameId = null; //[cite: 1]
let ppgSignal = []; //[cite: 1]
let timeStamps = []; //[cite: 1]
let startTime = 0; //[cite: 1]
const DURATION = 60000; //[cite: 1]

// Recordar el nombre del alumno[cite: 1]
document.addEventListener('DOMContentLoaded', () => {
    const nombreGuardado = localStorage.getItem('nombre_alumno_hrv'); //[cite: 1]
    if (nombreGuardado) {
        alumnoInput.value = nombreGuardado; //[cite: 1]
        statusDiv.innerText = "Listo para comenzar."; //[cite: 1]
    }
});

startBtn.addEventListener('click', startTest); //[cite: 1]

async function startTest() {
    const nombre = alumnoInput.value.trim(); //[cite: 1]
    if (!nombre) {
        alert("Por favor, ingresa tu nombre y apellido antes de comenzar."); //[cite: 1]
        return;
    }
    
    localStorage.setItem('nombre_alumno_hrv', nombre); //[cite: 1]
    
    ppgSignal = []; //[cite: 1]
    timeStamps = []; //[cite: 1]
    resultDiv.style.display = 'none'; //[cite: 1]
    startBtn.disabled = true; //[cite: 1]
    alumnoInput.disabled = true; //[cite: 1]
    progressContainer.style.display = 'block'; //[cite: 1]
    progressBar.style.width = '0%'; //[cite: 1]
    statusDiv.innerText = "Inicializando cámara y encendiendo flash..."; //[cite: 1]

    try {
        streamRef = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", frameRate: { ideal: 30 } } //[cite: 1]
        });
        
        video.srcObject = streamRef; //[cite: 1]
        const track = streamRef.getVideoTracks()[0]; //[cite: 1]
        const capabilities = track.getCapabilities(); //[cite: 1]
        if (capabilities.torch) {
            await track.applyConstraints({ advanced: [{ torch: true }] }); //[cite: 1]
        }
        
        statusDiv.innerText = "Midiendo pulso... Mantén el dedo muy quieto."; //[cite: 1]
        startTime = performance.now(); //[cite: 1]
        
        if ('requestVideoFrameCallback' in video) {
            video.requestVideoFrameCallback(processFrameCallback); //[cite: 1]
        } else {
            processFrameLegacy(); //[cite: 1]
        }
        
    } catch (err) {
        alert("Error de acceso a la cámara. Recuerda usar un enlace seguro HTTPS."); //[cite: 1]
        resetUI(); //[cite: 1]
    }
}

function processFrameCallback() {
    if (!streamRef) return; //[cite: 1]
    analyzeFrame(); //[cite: 1]
    const elapsed = performance.now() - startTime; //[cite: 1]
    progressBar.style.width = Math.min((elapsed / DURATION) * 100, 100) + '%'; //[cite: 1]
    if (elapsed < DURATION) {
        video.requestVideoFrameCallback(processFrameCallback); //[cite: 1]
    } else {
        endTest(); //[cite: 1]
    }
}

function processFrameLegacy() {
    if (!streamRef) return; //[cite: 1]
    analyzeFrame(); //[cite: 1]
    const elapsed = performance.now() - startTime; //[cite: 1]
    progressBar.style.width = Math.min((elapsed / DURATION) * 100, 100) + '%'; //[cite: 1]
    if (elapsed < DURATION) {
        animationFrameId = requestAnimationFrame(processFrameLegacy); //[cite: 1]
    } else {
        endTest(); //[cite: 1]
    }
}

function analyzeFrame() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) { //[cite: 1]
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height); //[cite: 1]
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data; //[cite: 1]
        let redSum = 0; //[cite: 1]
        for (let i = 0; i < imgData.length; i += 4) { //[cite: 1]
            redSum += imgData[i]; //[cite: 1]
        }
        ppgSignal.push(redSum / (imgData.length / 4)); //[cite: 1]
        timeStamps.push(performance.now()); //[cite: 1]
    }
}

function resetUI() {
    startBtn.disabled = false; //[cite: 1]
    alumnoInput.disabled = false; //[cite: 1]
    progressContainer.style.display = 'none'; //[cite: 1]
    statusDiv.innerText = "Listo para comenzar."; //[cite: 1]
}

function endTest() {
    if (streamRef) { //[cite: 1]
        streamRef.getTracks().forEach(track => track.stop()); //[cite: 1]
        streamRef = null; //[cite: 1]
    }
    if (animationFrameId) cancelAnimationFrame(animationFrameId); //[cite: 1]
    
    statusDiv.innerText = "Calculando variabilidad de pulso..."; //[cite: 1]
    
    setTimeout(async () => {
        const rrIntervals = calculateRRIntervals(ppgSignal, timeStamps); //[cite: 1]
        
        if(rrIntervals.length < 5) { //[cite: 1]
            statusDiv.innerText = "Error: Lectura inestable. Revisa la colocación del dedo."; //[cite: 1]
            resetUI(); //[cite: 1]
            return;
        }
        
        const rmssd = calculateRMSSD(rrIntervals); //[cite: 1]
        const avgRR = rrIntervals.reduce((a, b) => a + b, 0) / rrIntervals.length; //[cite: 1]
        const bpm = Math.round(60000 / avgRR); //[cite: 1]
        
        rmssdVal.innerText = `${rmssd.toFixed(1)} ms`; //[cite: 1]
        pulseVal.innerText = `Frecuencia Cardíaca: ${bpm} BPM`; //[cite: 1]
        cloudStatus.innerText = "Enviando datos de recuperación a la nube..."; //[cite: 1]
        resultDiv.style.display = 'block'; //[cite: 1]
        
        // ENVÍO DE DATOS AUTOMÁTICO EN LA NUBE[cite: 1]
        await enviarDatosSupabase(alumnoInput.value.trim(), rmssd, bpm); //[cite: 1]
        
        resetUI(); //[cite: 1]
    }, 500); //[cite: 1]
}

// 🛠️ ALGORITMO OPTIMIZADO CON FILTRO PARA EVITAR EL DOBLE CONTEO
function calculateRRIntervals(signal, timestamps) {
    const rrIntervals = []; //[cite: 1]
    let lastPeakTime = null; //[cite: 1]
    const smoothSignal = []; //[cite: 1]
    const windowSize = 7; // Incrementado ligeramente para un mejor suavizado de ruido fino
    
    // Suavizado por media móvil local[cite: 1]
    for(let i = 0; i < signal.length; i++) { //[cite: 1]
        let start = Math.max(0, i - windowSize); //[cite: 1]
        let end = Math.min(signal.length, i + windowSize); //[cite: 1]
        let localMean = 0; //[cite: 1]
        for(let j = start; j < end; j++) localMean += signal[j]; //[cite: 1]
        smoothSignal.push(signal[i] - (localMean / (end - start))); //[cite: 1]
    }

    // Definición de umbral adaptativo
    const maxVal = Math.max(...smoothSignal);
    const minPeakThreshold = maxVal * 0.15; // Un pico debe ser al menos el 15% del pico más alto detectado

    for (let i = 1; i < smoothSignal.length - 1; i++) {
        // Detección de picos locales[cite: 1]
        if (smoothSignal[i] > smoothSignal[i-1] && smoothSignal[i] > smoothSignal[i+1] && smoothSignal[i] > minPeakThreshold) {
            const currentPeakTime = timestamps[i]; //[cite: 1]
            
            if (lastPeakTime !== null) {
                const rr = currentPeakTime - lastPeakTime; //[cite: 1]
                
                // 🛑 VENTANA REFRACTARIA CRÍTICA:
                // Ignorar de inmediato cualquier "latido" que ocurra antes de los 450 ms (Equivale a un límite fisiológico de 133 BPM en reposo).
                // Esto elimina de raíz la lectura de la onda dicrótica y el ruido de alta frecuencia del canal.
                if (rr >= 450 && rr <= 1500) { 
                    if(rrIntervals.length > 0) { //[cite: 1]
                        const prevRR = rrIntervals[rrIntervals.length - 1]; //[cite: 1]
                        // Filtro de consistencia fisiológica (Evita variaciones absurdas mayores al 25% entre latidos seguidos)
                        if(Math.abs(rr - prevRR) / prevRR <= 0.25) { 
                            rrIntervals.push(rr); //[cite: 1]
                        }
                    } else {
                        rrIntervals.push(rr); //[cite: 1]
                    }
                    lastPeakTime = currentPeakTime; // Actualizar solo cuando se confirma un latido real válido
                }
            } else {
                lastPeakTime = currentPeakTime; //[cite: 1]
            }
        }
    }
    return rrIntervals; //[cite: 1]
}

function calculateRMSSD(rrIntervals) { //[cite: 1]
    let sumSquaredDiffs = 0; //[cite: 1]
    for (let i = 0; i < rrIntervals.length - 1; i++) { //[cite: 1]
        const diff = rrIntervals[i] - rrIntervals[i+1]; //[cite: 1]
        sumSquaredDiffs += diff * diff; //[cite: 1]
    }
    return Math.sqrt(sumSquaredDiffs / (rrIntervals.length - 1)); //[cite: 1]
}

// 🛠️ ENVÍO DE FECHA CON MARCA DE TIEMPO COMPLETA
async function enviarDatosSupabase(nombre, rmssd, bpm) {
    // Obtenemos la hora local del dispositivo del alumno con su respectiva zona horaria
    const tzoffset = (new Date()).getTimezoneOffset() * 60000;
    const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().slice(0, -1);
    
    // Esto guardará un formato completo: "2026-07-16T22:45:00.123"
    // Supabase lo recibirá de forma cronológica perfecta.
    const fechaCompleta = localISOTime; 
    
    try {
        const { data, error } = await supabase //[cite: 1]
            .from('registros_hrv') //[cite: 1]
            .insert([ //[cite: 1]
                { 
                    alumno_nombre: nombre, //[cite: 1]
                    hrv_rmssd: parseFloat(rmssd.toFixed(1)), //[cite: 1]
                    pulso_bpm: parseInt(bpm), //[cite: 1]
                    fecha: fechaCompleta // Guardamos la marca de tiempo exacta
                }
            ]); //[cite: 1]
            
        if (error) throw error; //[cite: 1]
        
        cloudStatus.innerText = "✓ Sincronizado correctamente con tu Coach."; //[cite: 1]
        cloudStatus.style.color = "#28a745"; //[cite: 1]
    } catch (err) { //[cite: 1]
        console.error("Error al sincronizar con Supabase: ", err); //[cite: 1]
        cloudStatus.innerText = "⚠ Guardado localmente, error de red al sincronizar."; //[cite: 1]
        cloudStatus.style.color = "#dc3545"; //[cite: 1]
    }
}
</script>
</body>
</html>
