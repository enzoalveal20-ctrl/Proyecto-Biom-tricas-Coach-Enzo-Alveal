<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo HRV en Tiempo Real</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            font-size: 16px;
            border-radius: 25px;
            box-sizing: border-box;
            border: none;
        }
        input {
            background-color: #2b2b2b;
            color: white;
            text-align: center;
        }
        button {
            background-color: #00adb5;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled { background-color: #444444; cursor: not-allowed; }
        #progressContainer {
            margin-top: 20px;
            background-color: #333;
            border-radius: 10px;
            display: none;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 20px;
            background-color: #00adb5;
            transition: width 0.1s linear;
        }
        #status { margin-top: 15px; font-size: 14px; color: #aaaaaa; padding: 0 10px; }
        #result {
            margin-top: 25px;
            padding: 15px;
            background: #252525;
            border-radius: 10px;
            display: none;
            border: 1px solid #333;
        }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Test de HRV Matutino</h2>
    <p style="font-size: 13px; color: #ccc;">Coloca tu dedo índice cubriendo firmemente la cámara trasera y el flash.</p>
    
    <input type="text" id="alumnoInput" placeholder="Escribe tu Nombre y Apellido" />
    <button id="startBtn">Iniciar Medición (60s)</button>
    
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
    
    <div id="status">Ingresa tu nombre para comenzar.</div>
    
    <div id="result">
        <h3>Resultado de hoy</h3>
        <p id="rmssdVal" style="font-size: 28px; font-weight: bold; color: #00adb5; margin: 10px 0;"></p>
        <p id="pulseVal" style="font-size: 15px; color: #eee;"></p>
        <p id="cloudStatus" style="font-size: 13px; color: #28a745; font-weight: bold; margin-top: 10px;"></p>
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="20" height="20"></canvas>

<script>
const SUPABASE_URL = "https://ahsqbiqbxyqmzejhjiwt.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoc3FiaXFieHlxbXplamhqaXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDc3MjcsImV4cCI6MjA5OTYyMzcyN30.UpGXmJK2N8SNVhKvh1xijpYfCC1KH_91nFdjA461g9M";
    
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const startBtn = document.getElementById('startBtn');
const alumnoInput = document.getElementById('alumnoInput');
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');
const statusDiv = document.getElementById('status');
const resultDiv = document.getElementById('result');
const rmssdVal = document.getElementById('rmssdVal');
const pulseVal = document.getElementById('pulseVal');
const cloudStatus = document.getElementById('cloudStatus');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

let streamRef = null;
let animationFrameId = null;
let ppgSignal = [];
let timeStamps = [];
let startTime = 0;
const DURATION = 60000;

document.addEventListener('DOMContentLoaded', () => {
    const nombreGuardado = localStorage.getItem('nombre_alumno_hrv');
    if (nombreGuardado) {
        alumnoInput.value = nombreGuardado;
        statusDiv.innerText = "Listo para comenzar.";
    }
});

startBtn.addEventListener('click', startTest);

async function startTest() {
    const nombre = alumnoInput.value.trim();
    if (!nombre) {
        alert("Por favor, ingresa tu nombre y apellido antes de comenzar.");
        return;
    }
    
    localStorage.setItem('nombre_alumno_hrv', nombre);
    
    ppgSignal = [];
    timeStamps = [];
    resultDiv.style.display = 'none';
    startBtn.disabled = true;
    alumnoInput.disabled = true;
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    statusDiv.innerText = "Cargando lentes ópticos móviles...";

    try {
        streamRef = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: "environment", 
                frameRate: { ideal: 30 },
                width: { ideal: 160 },
                height: { ideal: 160 }
            }
        });
        
        video.srcObject = streamRef;
        const track = streamRef.getVideoTracks()[0];
        const capabilities = track.getCapabilities();
        
        if (capabilities.torch) {
            await track.applyConstraints({ advanced: [{ torch: true }] });
        }
        
        statusDiv.innerText = "Midiendo... Mantén el dedo firme cubriendo el lente y el flash.";
        startTime = performance.now();
        
        if ('requestVideoFrameCallback' in video) {
            video.requestVideoFrameCallback(processFrameCallback);
        } else {
            processFrameLegacy();
        }
        
    } catch (err) {
        alert("Error de acceso a la cámara. Revisa los permisos HTTPS.");
        resetUI();
    }
}

function processFrameCallback() {
    if (!streamRef) return;
    analyzeFrame();
    const elapsed = performance.now() - startTime;
    progressBar.style.width = Math.min((elapsed / DURATION) * 100, 100) + '%';
    if (elapsed < DURATION) {
        video.requestVideoFrameCallback(processFrameCallback);
    } else {
        endTest();
    }
}

function processFrameLegacy() {
    if (!streamRef) return;
    analyzeFrame();
    const elapsed = performance.now() - startTime;
    progressBar.style.width = Math.min((elapsed / DURATION) * 100, 100) + '%';
    if (elapsed < DURATION) {
        animationFrameId = requestAnimationFrame(processFrameLegacy);
    } else {
        endTest();
    }
}

function analyzeFrame() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let redSum = 0;
        for (let i = 0; i < imgData.length; i += 4) {
            redSum += imgData[i]; 
        }
        ppgSignal.push(redSum / (imgData.length / 4));
        timeStamps.push(performance.now());
    }
}

function resetUI() {
    startBtn.disabled = false;
    alumnoInput.disabled = false;
    progressContainer.style.display = 'none';
}

function endTest() {
    if (streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
        streamRef = null;
    }
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    
    statusDiv.innerText = "Filtrando señal con algoritmo de percentil móvil...";
    
    setTimeout(async () => {
        const rrIntervals = calculateRRIntervals(ppgSignal, timeStamps);
        
        if(rrIntervals.length < 20) {
            statusDiv.innerText = `Lectura incompleta (${rrIntervals.length} latidos). Recuerda posar el dedo suavemente sobre el flash sin aplastarlo para no cortar el flujo sanguíneo.`;
            resetUI();
            return;
        }
        
        const rmssd = calculateRMSSD(rrIntervals);
        const avgRR = rrIntervals.reduce((a, b) => a + b, 0) / rrIntervals.length;
        const bpm = Math.round(60000 / avgRR);
        
        rmssdVal.innerText = `${rmssd.toFixed(1)} ms`;
        pulseVal.innerText = `Frecuencia Cardíaca: ${bpm} BPM (Basado en ${rrIntervals.length} ondas estables)`;
        cloudStatus.innerText = "Sincronizando con Supabase...";
        resultDiv.style.display = 'block';
        
        await enviarDatosSupabase(alumnoInput.value.trim(), rmssd, bpm);
        resetUI();
    }, 600);
}

// 🧠 FILTRO DE PERCENTIL CON PERIODO REFRACTARIO ANTIDICRÓTICO
function calculateRRIntervals(signal, timestamps) {
    const rrIntervals = [];
    const smoothSignal = [];
    const windowSize = 5; 

    if (signal.length < 60) return [];

    // 1. Eliminación de la deriva del flash (Media móvil centrada)
    for(let i = 0; i < signal.length; i++) {
        let start = Math.max(0, i - windowSize);
        let end = Math.min(signal.length, i + windowSize);
        let localMean = 0;
        for(let j = start; j < end; j++) localMean += signal[j];
        smoothSignal.push(signal[i] - (localMean / (end - start)));
    }

    // 2. Encontrar el Percentil 75 para picos limpios
    const sortedValues = [...smoothSignal].sort((a, b) => a - b);
    const indexPercentil = Math.floor(sortedValues.length * 0.75);
    const globalThreshold = Math.max(sortedValues[indexPercentil], 0.01);

    let lastPeakTime = null;

    // 3. Extracción con bloqueo de tiempo (Periodo refractario de 500ms)
    for (let i = 1; i < smoothSignal.length - 1; i++) {
        if (smoothSignal[i] > smoothSignal[i-1] && smoothSignal[i] > smoothSignal[i+1] && smoothSignal[i] > globalThreshold) {
            const currentPeakTime = timestamps[i];

            if (lastPeakTime !== null) {
                const rr = currentPeakTime - lastPeakTime;

                // 🛑 FILTRO CRUCIAL: Si pasaron menos de 530 ms, es la onda dicrótica/doble pico. Se ignora.
                if (rr < 530) {
                    continue; 
                }

                // Ventana fisiológica real en reposo (38 a 113 BPM)
                if (rr >= 530 && rr <= 1600) {
                    rrIntervals.push(rr);
                    lastPeakTime = currentPeakTime;
                }
            } else {
                lastPeakTime = currentPeakTime;
            }
        }
    }

    // 4. Limpieza final de Outliers estadísticos estándar
    if (rrIntervals.length < 5) return [];
    const avg = rrIntervals.reduce((a,b)=>a+b, 0) / rrIntervals.length;
    return rrIntervals.filter(rr => Math.abs(rr - avg) / avg <= 0.35);
}}

function calculateRMSSD(rrIntervals) {
    let sumSquaredDiffs = 0;
    for (let i = 0; i < rrIntervals.length - 1; i++) {
        const diff = rrIntervals[i] - rrIntervals[i+1];
        sumSquaredDiffs += diff * diff;
    }
    return Math.sqrt(sumSquaredDiffs / (rrIntervals.length - 1));
}

async function enviarDatosSupabase(nombre, rmssd, bpm) {
    const tzoffset = (new Date()).getTimezoneOffset() * 60000;
    const localISOTime = (new Date(Date.now() - tzoffset)).toISOString().slice(0, -1);
    
    try {
        const { data, error } = await supabaseClient
            .from('registros_hrv')
            .insert([
                { 
                    alumno_nombre: nombre,
                    hrv_rmssd: parseFloat(rmssd.toFixed(1)),
                    pulso_bpm: parseInt(bpm),
                    fecha: localISOTime 
                }
            ]);
            
        if (error) throw error;
        
        cloudStatus.innerText = "✓ Sincronizado correctamente con tu base de datos.";
        cloudStatus.style.color = "#28a745";
    } catch (err) {
        console.error("Error al sincronizar con Supabase: ", err);
        cloudStatus.innerText = "⚠ Guardado localmente, error de red al sincronizar.";
        cloudStatus.style.color = "#dc3545";
    }
}
</script>
</body>
</html>
