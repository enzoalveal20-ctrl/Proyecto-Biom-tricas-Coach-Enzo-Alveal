function analyzeFrame() {

        ppgSignal.push(redSum / (imgData.length / 4));[cite: 3]

function calculateRRIntervals(signal, timestamps) {
    const rrIntervals = []; 
    let lastPeakTime = null; 
    const smoothSignal = []; 
    const windowSize = 7;[cite: 3]
    
    for(let i = 0; i < signal.length; i++) {[cite: 3]
        let start = Math.max(0, i - windowSize);[cite: 3]
        let end = Math.min(signal.length, i + windowSize);[cite: 3]
        let localMean = 0;[cite: 3]
        for(let j = start; j < end; j++) localMean += signal[j];[cite: 3]
        smoothSignal.push(signal[i] - (localMean / (end - start)));[cite: 3]
    }

    const maxVal = Math.max(...smoothSignal);
    const minPeakThreshold = maxVal * 0.12; 

    for (let i = 1; i < smoothSignal.length - 1; i++) {
        if (smoothSignal[i] > smoothSignal[i-1] && smoothSignal[i] > smoothSignal[i+1] && smoothSignal[i] > minPeakThreshold) {
            const currentPeakTime = timestamps[i];[cite: 3]
            
            if (lastPeakTime !== null) {
                const rr = currentPeakTime - lastPeakTime;[cite: 3]
                
                if (rr >= 450 && rr <= 1600) { 
                    if(rrIntervals.length > 0) {[cite: 3]
                        const prevRR = rrIntervals[rrIntervals.length - 1];[cite: 3]
                        if(Math.abs(rr - prevRR) / prevRR <= 0.40) { 
                            rrIntervals.push(rr); 
                            lastPeakTime = currentPeakTime; 
                        }
                    } else {
                        rrIntervals.push(rr); 
                        lastPeakTime = currentPeakTime; 
                    }
                }
            } else {
                lastPeakTime = currentPeakTime;[cite: 3]
            }
        }
    }
    return rrIntervals;[cite: 3]
}

function calculateRMSSD(rrIntervals) { Impl[cite: 3]
    let sumSquaredDiffs = 0;[cite: 3]
    for (let i = 0; i < rrIntervals.length - 1; i++) {[cite: 1, 3]
        const diff = rrIntervals[i] - rrIntervals[i+1];[cite: 3]
        sumSquaredDiffs += diff * diff;[cite: 3]
    }
    return Math.sqrt(sumSquaredDiffs / (rrIntervals.length - 1));[cite: 3]
}
