<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Coach - Perfil de Atleta 360°</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#121212] text-white min-h-screen p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-[#00adb5]">Perfil de Atleta 360°</h1>
                <p class="text-gray-400 text-sm">Monitoreo Fisiológico y Semáforo de Recuperación Basal</p>
            </div>
            <button id="refreshBtn" class="bg-[#00adb5] hover:bg-[#008c94] text-white font-bold py-2 px-6 rounded-lg transition">
                Actualizar Datos ↻
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-[#1e1e1e] p-5 rounded-xl shadow-lg border border-gray-800">
                <h2 class="text-lg font-bold mb-4 text-[#00adb5] border-b border-gray-700 pb-2">Estado Diario de Alumnos</h2>
                <div id="loadingText" class="text-gray-500 text-center py-4">Cargando datos desde la nube...</div>
                <div id="athletesList" class="space-y-3">
                    </div>
            </div>

            <div class="lg:col-span-2 bg-[#1e1e1e] p-5 rounded-xl shadow-lg border border-gray-800 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                        <h2 id="selectedAthleteName" class="text-xl font-bold text-white">Selecciona un Alumno</h2>
                        <span id="selectedAthleteStatus" class="px-3 py-1 rounded-full text-xs font-bold"></span>
                    </div>

                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div class="bg-[#252525] p-3 rounded-lg text-center">
                            <span class="text-xs text-gray-400 block">Último HRV</span>
                            <span id="metricLatestHrv" class="text-xl font-bold text-[#00adb5]">-</span>
                        </div>
                        <div class="bg-[#252525] p-3 rounded-lg text-center">
                            <span class="text-xs text-gray-400 block">Promedio HRV</span>
                            <span id="metricAvgHrv" class="text-xl font-bold text-gray-200">-</span>
                        </div>
                        <div class="bg-[#252525] p-3 rounded-lg text-center">
                            <span class="text-xs text-gray-400 block">FC Reposo</span>
                            <span id="metricPulse" class="text-xl font-bold text-red-400">-</span>
                        </div>
                    </div>

                    <div class="bg-[#252525] p-4 rounded-lg min-h-[300px] flex items-center justify-center">
                        <canvas id="hrvChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
// !!! REEMPLAZA ESTOS VALORES CON LAS MISMAS CREDENCIALES DE TU SUPABASE !!!
const SUPABASE_URL = "https://ahsqbiqbxyqmzejhjiwt.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_O8NqH721eHS7tPnWB7nRcA_as2-ExB6";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let rawData = [];
let athletesData = {};
let hrvChartInstance = null;

document.addEventListener('DOMContentLoaded', initDashboard);
document.getElementById('refreshBtn').addEventListener('click', loadDataFromSupabase);

async function initDashboard() {
    await loadDataFromSupabase();
}

async function loadDataFromSupabase() {
    document.getElementById('loadingText').style.display = 'block';
    document.getElementById('athletesList').innerHTML = '';
    
    try {
        const { data, error } = await supabase
            .from('registros_hrv')
            .select('*')
            .order('fecha', { ascending: true });
            
        if (error) throw error;
        
        rawData = data;
        processAthletesData();
        renderAthletesList();
        document.getElementById('loadingText').style.display = 'none';
    } catch (err) {
        console.error("Error al leer Supabase:", err);
        document.getElementById('loadingText').innerText = "Error de conexión con la base de datos.";
    }
}

// Agrupar lecturas por nombre del alumno
function processAthletesData() {
    athletesData = {};
    rawData.forEach(row => {
        const name = row.alumno_nombre;
        if (!athletesData[name]) {
            athletesData[name] = [];
        }
        athletesData[name].push(row);
    });
}

// Renderizar la lista de alumnos a la izquierda con el Semáforo de Alerta
function renderAthletesList() {
    const listContainer = document.getElementById('athletesList');
    listContainer.innerHTML = '';
    
    const athleteNames = Object.keys(athletesData);
    
    if(athleteNames.length === 0) {
        listContainer.innerHTML = `<p class="text-gray-500 text-center py-4">No hay registros aún en la base de datos.</p>`;
        return;
    }

    athleteNames.forEach(name => {
        const records = athletesData[name];
        const latestRecord = records[records.length - 1];
        
        // --- Criterios de Semáforo Fisiológico Basal ---
        let statusColor = "bg-green-500"; 
        let statusText = "Óptimo";
        
        // Lógica simple de semáforo preventivo basada en HRV (RMSSD):
        // (En el futuro podemos calcular la desviación estándar del propio alumno)
        if (latestRecord.hrv_rmssd < 35) {
            statusColor = "bg-red-500";
            statusText = "Atención / Fatiga";
        } else if (latestRecord.hrv_rmssd >= 35 && latestRecord.hrv_rmssd < 50) {
            statusColor = "bg-yellow-500";
            statusText = "Precaución";
        }

        const itemHtml = `
            <div onclick="selectAthlete('${name}')" class="flex justify-between items-center bg-[#252525] p-3 rounded-lg hover:bg-[#2d2d2d] transition cursor-pointer border-l-4 border-${statusText === 'Atención / Fatiga' ? 'red-500' : statusText === 'Precaución' ? 'yellow-500' : 'green-500'}">
                <div>
                    <h3 class="font-bold text-sm text-white">${name}</h3>
                    <p class="text-xs text-gray-400">Último: ${latestRecord.fecha}</p>
                </div>
                <div class="text-right">
                    <span class="text-sm font-bold block text-[#00adb5]">${latestRecord.hrv_rmssd} ms</span>
                    <span class="text-[10px] text-gray-400">${latestRecord.pulso_bpm} BPM</span>
                </div>
            </div>
        `;
        listContainer.innerHTML += itemHtml;
    });

    // Seleccionar automáticamente al primer atleta de la lista por comodidad
    if (athleteNames.length > 0) {
        selectAthlete(athleteNames[0]);
    }
}

// Mostrar los datos específicos del alumno seleccionado
function selectAthlete(name) {
    const records = athletesData[name];
    const latestRecord = records[records.length - 1];
    
    // Calcular promedios
    const avgHrv = (records.reduce((acc, r) => acc + r.hrv_rmssd, 0) / records.length).toFixed(1);

    // Actualizar Textos
    document.getElementById('selectedAthleteName').innerText = name;
    document.getElementById('metricLatestHrv').innerText = `${latestRecord.hrv_rmssd} ms`;
    document.getElementById('metricAvgHrv').innerText = `${avgHrv} ms`;
    document.getElementById('metricPulse').innerText = `${latestRecord.pulso_bpm} BPM`;

    const statusBadge = document.getElementById('selectedAthleteStatus');
    statusBadge.innerText = latestRecord.hrv_rmssd < 35 ? "ESTRÉS ALTO / FATIGA" : latestRecord.hrv_rmssd < 50 ? "PRECAUCIÓN" : "RECUPERADO";
    statusBadge.className = `px-3 py-1 rounded-full text-xs font-bold ${latestRecord.hrv_rmssd < 35 ? 'bg-red-900 text-red-200' : latestRecord.hrv_rmssd < 50 ? 'bg-yellow-950 text-yellow-300' : 'bg-green-950 text-green-300'}`;

    // Renderizar gráfico del alumno
    renderChart(records);
}

// Pintar el gráfico dinámico de línea
function renderChart(records) {
    const ctx = document.getElementById('hrvChart').getContext('2d');
    
    const labels = records.map(r => r.fecha);
    const hrvValues = records.map(r => r.hrv_rmssd);
    const pulseValues = records.map(r => r.pulso_bpm);

    if (hrvChartInstance) {
        hrvChartInstance.destroy();
    }

    hrvChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Variabilidad (HRV RMSSD)',
                    data: hrvValues,
                    borderColor: '#00adb5',
                    backgroundColor: 'rgba(0, 173, 181, 0.1)',
                    tension: 0.3,
                    fill: true,
                    yAxisID: 'y'
                },
                {
                    label: 'Frecuencia Cardíaca (BPM)',
                    data: pulseValues,
                    borderColor: '#f87171',
                    borderDash: [5, 5],
                    tension: 0.3,
                    yAxisID: 'y1'
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    type: 'linear',
                    display: true,
                    position: 'left',
                    grid: { color: '#333' },
                    ticks: { color: '#ccc' },
                    title: { display: true, text: 'HRV (ms)', color: '#00adb5' }
                },
                y1: {
                    type: 'linear',
                    display: true,
                    position: 'right',
                    grid: { drawOnChartArea: false },
                    ticks: { color: '#ccc' },
                    title: { display: true, text: 'Pulso (BPM)', color: '#f87171' }
                },
                x: {
                    grid: { color: '#333' },
                    ticks: { color: '#ccc' }
                }
            },
            plugins: {
                legend: { labels: { color: '#fff' } }
            }
        }
    });
}
</script>
</body>
</html>
