                <p class="text-gray-400 text-sm">Monitoreo Fisiológico y Semáforo de Recuperación Basal</p>
            </div>
            <button id="refreshBtn" class="bg-[#00adb5] hover:bg-[#008c94] text-white font-bold py-2 px-6 rounded-lg transition">
                Actualizar Datos ↻

            <!-- Panel Izquierdo: Lista de Alumnos -->

                <div id="athletesList" class="space-y-3"></div>

            <!-- Panel Derecho: Gráfica y Métricas del Alumno Seleccionado -->

                    <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                        <h2 id="selectedAthleteName" class="text-xl font-bold text-white">Selecciona un Alumno</h2>
                        <span id="selectedAthleteStatus" class="px-3 py-1 rounded-full text-xs font-bold"></span>
                    </div>

<!-- Grid Superior de Métricas Fisiológicas -->
<div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
    <!-- Tarjeta 1: Último Control -->
    <div class="bg-[#252525] p-4 rounded-xl text-center border border-gray-800">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Último HRV</p>
        <p id="metricLatestHrv" class="text-2xl font-black text-[#00adb5] mt-1">-</p>
    </div>
    
    <!-- Tarjeta 2: Ventana Móvil Basal -->
    <div class="bg-[#252525] p-4 rounded-xl text-center border border-gray-800">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Línea Base Basal</p>
        <p id="metricAvgHrv" class="text-2xl font-black text-white mt-1">-</p>
    </div>

    <!-- Tarjeta 3: NUEVO - Rango SWC Óptimo -->
    <div class="bg-[#252525] p-4 rounded-xl text-center border border-gray-800">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Umbral Mín SWC</p>
        <p id="metricSwcRange" class="text-2xl font-black text-emerald-400 mt-1">-</p>
    </div>
    
    <!-- Tarjeta 4: Frecuencia Cardíaca -->
    <div class="bg-[#252525] p-4 rounded-xl text-center border border-gray-800">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">FC Reposo</p>
        <p id="metricPulse" class="text-2xl font-black text-rose-400 mt-1">-</p>
    </div>

    <!-- Tarjeta 5: NUEVO - Alerta de Tendencia Crítica -->
    <div class="bg-[#252525] p-4 rounded-xl text-center border border-gray-800">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Predicción Riesgo</p>
        <p id="metricRiskTrend" class="text-lg font-black text-amber-400 mt-2">-</p>
    </div>
</div>

                    <div class="bg-[#252525] p-4 rounded-lg min-h-[300px] flex items-center justify-center">
                        <canvas id="hrvChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
// 1. Inicialización y Credenciales con Nombre de Variable Corregido
const SUPABASE_URL = "https://ahsqbiqbxyqmzejhjiwt.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoc3FiaXFieHlxbXplamhqaXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDc3MjcsImV4cCI6MjA5OTYyMzcyN30.UpGXmJK2N8SNVhKvh1xijpYfCC1KH_91nFdjA461g9M";
    
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let rawData = [];
let athletesData = {};
let hrvChartInstance = null;
let currentSelectedAthlete = ""; 

// Arranque protegido esperando la inyección de librerías en ventana global
setTimeout(() => {
    console.log("🚀 [CONSOLA BIOMÉTRICA] Iniciando Dashboard...");
    loadDataFromSupabase();
}, 150);

document.getElementById('refreshBtn').addEventListener('click', loadDataFromSupabase);

async function loadDataFromSupabase() {
    console.log("📡 Intentando conectar con Supabase...");
    const loadingEl = document.getElementById('loadingText');
    if (loadingEl) {
        loadingEl.style.display = 'block';
        loadingEl.innerText = "Cargando datos desde la nube...";
    }
    document.getElementById('athletesList').innerHTML = '';
    
    try {
        const { data, error } = await supabaseClient
            .from('registros_hrv')
            .select('*')
            .order('fecha', { ascending: true });
            
        if (error) throw error;
        
        console.log("✅ Datos recuperados de forma exitosa:", data);
        rawData = data;
        processAthletesData();
        renderAthletesList();
        
        if (loadingEl) loadingEl.style.display = 'none';
    } catch (err) {
        console.error("❌ Error crítico en consulta a Supabase:", err);
        if (loadingEl) loadingEl.innerText = "Error de conexión o tabla inaccesible.";
    }
}

function processAthletesData() {
    athletesData = {};
    rawData.forEach(row => {
        const name = row.alumno_nombre;
        if (!athletesData[name]) {
            athletesData[name] = [];
        }
        athletesData[name].push(row);
    });
}

function renderAthletesList() {
    const listContainer = document.getElementById('athletesList');
    listContainer.innerHTML = '';
    
    const athleteNames = Object.keys(athletesData);
    
    if(athleteNames.length === 0) {
        listContainer.innerHTML = `<p class="text-gray-500 text-center py-4">No hay registros aún en la base de datos.</p>`;
        return;
    }

    athleteNames.forEach(name => {
        const records = athletesData[name];
        const latestRecord = records[records.length - 1];
        const hrvValues = records.map(r => r.hrv_rmssd);
        
        const analisis = calcularSWCyRegresion(hrvValues);
        
        let borderColor = "border-green-500";
        if (analisis.alerta) {
            borderColor = analisis.diagnostico.includes("Aguda") ? "border-red-500" : "border-yellow-500";
        }

        const fechaCorta = formatearFechaCronologica(latestRecord.fecha);

        const itemHtml = `
            <div onclick="selectAthlete('${name}')" class="flex justify-between items-center bg-[#252525] p-3 rounded-lg hover:bg-[#2d2d2d] transition cursor-pointer border-l-4 ${borderColor}">
                <div>
                    <h3 class="font-bold text-sm text-white">${name}</h3>
                    <p class="text-xs text-gray-400">Último: ${fechaCorta}</p>
                </div>
                <div class="text-right">
                    <span class="text-sm font-bold block text-[#00adb5]">${latestRecord.hrv_rmssd} ms</span>
                    <span class="text-[10px] text-gray-400">${latestRecord.pulso_bpm} BPM</span>
                </div>
            </div>
        `;
        listContainer.innerHTML += itemHtml;
    });

    if (athleteNames.length > 0) {
        selectAthlete(currentSelectedAthlete && athletesData[currentSelectedAthlete] ? currentSelectedAthlete : athleteNames[0]);
    }
}

function selectAthlete(name) {
    currentSelectedAthlete = name;
    const records = athletesData[name];
    const latestRecord = records[records.length - 1];
    
    const hrvValues = records.map(r => r.hrv_rmssd);
    const analisis = calcularSWCyRegresion(hrvValues);

    document.getElementById('selectedAthleteName').innerText = name;
    document.getElementById('metricLatestHrv').innerText = `${latestRecord.hrv_rmssd} ms`;
    document.getElementById('metricAvgHrv').innerText = `${analisis.promedioBasal} ms`;
    document.getElementById('metricPulse').innerText = `${latestRecord.pulso_bpm} BPM`;
    
    document.getElementById('metricSwcRange').innerText = analisis.error ? "-" : `>= ${analisis.limiteInferiorSWC} ms`;
    document.getElementById('metricRiskTrend').innerText = analisis.proyeccionDiasStatus;

    const statusBadge = document.getElementById('selectedAthleteStatus');
    statusBadge.innerText = analisis.diagnostico.toUpperCase();
    
    if (analisis.error) {
        statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-gray-800 text-gray-400";
    } else if (analisis.alerta) {
        statusBadge.className = analisis.diagnostico.includes("Aguda") 
            ? "px-3 py-1 rounded-full text-xs font-bold bg-red-900 text-red-200" 
            : "px-3 py-1 rounded-full text-xs font-bold bg-yellow-950 text-yellow-300";
    } else {
        statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-950 text-green-300";
    }

    renderChart(records, analisis);
}

function calcularSWCyRegresion(valoresCompletoRMSSD) {
    const totalMediciones = valoresCompletoRMSSD.length;

    if (totalMediciones < 5) {
        return {
            promedioBasal: (valoresCompletoRMSSD.reduce((a,b)=>a+b,0)/totalMediciones || 0).toFixed(1),
            diagnostico: "Faltan datos basales (Mín. 5)",
            alerta: false,
            error: true,
            proyeccionDiasStatus: "Datos Insuf."
        };
    }

    // Ventana móvil de los últimos 14 días
    const ventanaDatos = totalMediciones > 14 ? valoresCompletoRMSSD.slice(-14) : valoresCompletoRMSSD;
    const n = ventanaDatos.length;

    const totalBasal = ventanaDatos.reduce((acc, v) => acc + v, 0);
    const promedio = totalBasal / n;

    const varianza = ventanaDatos.reduce((acc, v) => acc + Math.pow(v - promedio, 2), 0) / n;
    const desviacionEstandar = Math.sqrt(varianza) || 1;

    const swcThreshold = 0.5 * desviacionEstandar;
    const limiteInferiorSWC = promedio - swcThreshold;

    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
    for (let i = 0; i < n; i++) {
        sumX += i;
        sumY += ventanaDatos[i];
        sumXY += i * ventanaDatos[i];
        sumXX += i * i;
    }
    const pendiente = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX) || 0;

    const ultimoHRV = valoresCompletoRMSSD[totalMediciones - 1];
    let estadoAtleta = "RECUPERADO / ADAPTACIÓN ÓPTIMA";
    let proyeccionAlerta = false;
    let proyeccionDiasStatus = "Estable";

    if (ultimoHRV < limiteInferiorSWC) {
        estadoAtleta = "FATIGA AGUDA (Fuera de SWC)";
        proyeccionAlerta = true;
        proyeccionDiasStatus = "Zona de Riesgo 🚨";
    } else if (pendiente < 0) {
        const distanciaAlRiesgo = ultimoHRV - limiteInferiorSWC;
        const diasEstimados = Math.abs(distanciaAlRiesgo / pendiente);
        
        if (diasEstimados <= 3) {
            estadoAtleta = "PRECAUCIÓN (Fatiga Acumulada)";
            proyeccionAlerta = true;
            proyeccionDiasStatus = `Riesgo en ~${Math.ceil(diasEstimados)} días 📉`;
        } else {
            proyeccionDiasStatus = `Estable (~${Math.ceil(diasEstimados)} d)`;
        }
    } else {
        proyeccionDiasStatus = "Estable 📈";
    }

    return {
        promedioBasal: promedio.toFixed(1),
        limiteInferiorSWC: limiteInferiorSWC.toFixed(1),
        pendienteRegresion: pendiente.toFixed(2),
        diagnostico: estadoAtleta,
        alerta: proyeccionAlerta,
        error: false,
        proyeccionDiasStatus: proyeccionDiasStatus
    };
}

function renderChart(records, analisis) {
    const ctx = document.getElementById('hrvChart').getContext('2d');
    
    const labels = records.map(r => formatearFechaCronologica(r.fecha));
    const hrvValues = records.map(r => r.hrv_rmssd);
    const pulseValues = records.map(r => r.pulso_bpm);

    // Reconstrucción de la línea de tendencia basada en los datos históricos totales para coherencia visual
    const trendValues = [];
    const n = hrvValues.length;
    const totalHrv = hrvValues.reduce((acc, v) => acc + v, 0);
    const avgHrv = totalHrv / n;
    
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
    for (let i = 0; i < n; i++) {
        sumX += i;
        sumY += hrvValues[i];
        sumXY += i * hrvValues[i];
        sumXX += i * i;
    }
    const pendiente = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX) || 0;
    const intercepto = avgHrv - pendiente * ((n - 1) / 2);

    for (let i = 0; i < n; i++) {
        trendValues.push(Number((pendiente * i + intercepto).toFixed(1)));
    }

    if (hrvChartInstance) {
        hrvChartInstance.destroy();
    }

    const mostrarSWC = !analisis.error;
    const valPromedio = mostrarSWC ? Number(analisis.promedioBasal) : null;
    const valInferior = mostrarSWC ? Number(analisis.limiteInferiorSWC) : null;

    hrvChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Variabilidad (HRV RMSSD) [Eje Izquierdo]',
                    data: hrvValues,
                    borderColor: '#00adb5',
                    backgroundColor: 'rgba(0, 173, 181, 0.1)',
                    pointBackgroundColor: '#00adb5',
                    pointRadius: 5,
                    tension: 0.2,
                    fill: false,
                    yAxisID: 'y'
                },
                {
                    label: 'Tendencia Lineal HRV',
                    data: trendValues,
                    borderColor: 'rgba(255, 255, 255, 0.35)',
                    borderDash: [4, 4],
                    pointRadius: 0,
                    tension: 0,
                    fill: false,
                    yAxisID: 'y'
                },
                {
                    label: 'Frecuencia Cardíaca (BPM) [Eje Derecho]',
                    data: pulseValues,
                    borderColor: '#f87171',
                    pointBackgroundColor: '#f87171',
                    borderDash: [2, 2],
                    pointRadius: 4,
                    tension: 0.2,
                    fill: false,
                    yAxisID: 'y1'
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            onClick: async (e, elements) => {
                if (elements.length > 0) {
                    const index = elements[0].index;
                    const registroSeleccionado = records[index];
                    
                    const confirmar = confirm(`¿Deseas eliminar la medición del día ${labels[index]} por considerarla un error de toma?`);
                    if (confirmar) {
                        await eliminarMedicion(registroSeleccionado.id);
                    }
                }
            },
            scales: {
                y: {
                    type: 'linear',
                    display: true,
                    position: 'left',
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: '#00adb5' },
                    title: { display: true, text: 'HRV (ms)', color: '#00adb5', font: { weight: 'bold' } }
                },
                y1: {
                    type: 'linear',
                    display: true,
                    position: 'right',
                    grid: { drawOnChartArea: false }, 
                    ticks: { color: '#f87171' },
                    title: { display: true, text: 'Pulso (BPM)', color: '#f87171', font: { weight: 'bold' } }
                },
                x: {
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: '#ccc', maxRotation: 45, minRotation: 45 }
                }
            },
            plugins: {
                legend: { labels: { color: '#fff', fontSize: 11 } },
                annotation: mostrarSWC ? {
                    annotations: {
                        boxSWC: {
                            type: 'box',
                            yMin: valInferior,
                            yMax: valPromedio + (valPromedio - valInferior), 
                            backgroundColor: 'rgba(16, 185, 129, 0.04)',
                            borderColor: 'rgba(16, 185, 129, 0.2)',
                            borderWidth: 1,
                            label: {
                                display: true,
                                content: 'Zona Óptima SWC',
                                position: 'start',
                                color: 'rgba(16, 185, 129, 0.6)',
                                font: { size: 10 }
                            }
                        }
                    }
                } : {},
                tooltip: {
                    callbacks: {
                        footer: () => "💡 Clic en el punto para borrar esta medición"
                    }
                }
            }
        }
    });
}

function formatearFechaCronologica(fechaStr) {
    try {
        const d = new Date(fechaStr);
        if (isNaN(d.getTime())) return fechaStr;
        
        const dia = String(d.getDate()).padStart(2, '0');
        const mes = String(d.getMonth() + 1).padStart(2, '0');
        const hora = String(d.getHours()).padStart(2, '0');
        const mins = String(d.getMinutes()).padStart(2, '0');
        
        return `${dia}/${mes} ${hora}:${mins}`;
    } catch {
        return fechaStr;
    }
}

async function eliminarMedicion(idMedicion) {
    try {
        const { error } = await supabaseClient
            .from('registros_hrv')
            .delete()
            .eq('id', idMedicion);

        if (error) throw error;
        await loadDataFromSupabase();
    } catch (err) {
        console.error("Error al eliminar registro:", err.message);
        alert("No se pudo eliminar de la base de datos.");
    }
}
</script>
